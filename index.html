<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Glass QR Pro - Ultra Modern Edition</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #050505; 
            color: white; 
            overflow-x: hidden;
            margin: 0;
        }

        h1, h2, h3, .font-heading { font-family: 'Space Grotesk', sans-serif; }

        /* Animated Mesh Background */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(147, 51, 234, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(5, 5, 5, 1) 0%, rgba(10, 10, 10, 0.9) 100%);
            z-index: -1;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(30px) saturate(180%); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Scanner Frame */
        #reader {
            border: none !important;
            background: transparent !important;
        }
        #reader video {
            border-radius: 32px;
            object-fit: cover;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent);
            top: 0;
            left: 0;
            z-index: 20;
            animation: scan-move 4s linear infinite;
        }

        @keyframes scan-move {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .btn-primary {
            background: linear-gradient(135deg, #fff 0%, #e2e8f0 100%);
            color: #000;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            background: #00f2ff;
        }

        /* Animations */
        .animate-in {
            animation: fadeInScale 0.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes fadeInScale {
            from { transform: translate(-50%, -45%) scale(0.95); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <div class="bg-mesh"></div>

    <!-- Navigácia -->
    <header class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[calc(100%-3rem)] max-w-5xl">
        <nav class="glass px-8 py-4 rounded-3xl flex justify-between items-center border-white/5">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-white text-black rounded-xl flex items-center justify-center font-black">QR</div>
                <h1 class="text-lg font-bold tracking-tight">ENGINE <span class="text-cyan-400">0.9</span></h1>
            </div>
            
            <button onclick="toggleSettings()" class="w-10 h-10 flex items-center justify-center hover:bg-white/10 rounded-xl transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
        </nav>
    </header>

    <main class="relative z-10 pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <div class="grid lg:grid-cols-12 gap-8">
            <!-- Skener -->
            <div class="lg:col-span-7 space-y-6">
                <div class="relative glass p-4 rounded-[3.5rem] border-white/10 overflow-hidden">
                    <div class="relative rounded-[2.5rem] overflow-hidden bg-black/40 aspect-video md:aspect-[4/3]">
                        <div id="reader"></div>
                        <div class="scan-line"></div>
                    </div>
                </div>
            </div>

            <!-- Výsledky -->
            <div class="lg:col-span-5">
                <div id="result-card" class="glass p-10 rounded-[3.5rem] min-h-[400px] flex flex-col border-white/10">
                    <div id="placeholder" class="flex-1 flex flex-col items-center justify-center text-center">
                        <h2 class="text-2xl font-bold">Čakanie na kód...</h2>
                    </div>
                    <div id="active-result" class="hidden flex-1 flex flex-col space-y-6">
                        <div id="decoded-text" class="p-6 bg-black/40 rounded-2xl border border-white/5 font-mono text-sm break-all"></div>
                        <button onclick="saveCurrentScan()" class="btn-primary w-full py-4 rounded-xl font-bold uppercase tracking-widest">Uložiť záznam</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL (Autorizácia a Nastavenia) -->
    <div id="modal" class="fixed inset-0 z-[100] hidden">
        <!-- Overlay -->
        <div class="absolute inset-0 bg-black/80 backdrop-blur-xl" onclick="toggleSettings()"></div>
        
        <!-- MODAL OBSAH: AUTORIZÁCIA -->
        <div id="auth-view" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90%] max-w-md p-10 glass rounded-[3rem] border-white/10 text-center animate-in">
            <div class="mb-8">
                <h2 class="text-2xl font-black tracking-tighter uppercase italic">Secure Access</h2>
                <p class="text-white/40 text-[10px] uppercase tracking-widest mt-2">Zadajte PIN administrátora</p>
            </div>
            
            <div id="auth-1" class="space-y-6">
                <div class="flex justify-center gap-3">
                    <input type="password" maxlength="1" onkeyup="nextStep(this, 0)" class="pin-in w-12 h-16 glass text-center text-2xl font-bold rounded-xl border-white/10 focus:border-cyan-400 outline-none">
                    <input type="password" maxlength="1" onkeyup="nextStep(this, 1)" class="pin-in w-12 h-16 glass text-center text-2xl font-bold rounded-xl border-white/10 focus:border-cyan-400 outline-none">
                    <input type="password" maxlength="1" onkeyup="nextStep(this, 2)" class="pin-in w-12 h-16 glass text-center text-2xl font-bold rounded-xl border-white/10 focus:border-cyan-400 outline-none">
                    <input type="password" maxlength="1" onkeyup="nextStep(this, 3)" class="pin-in w-12 h-16 glass text-center text-2xl font-bold rounded-xl border-white/10 focus:border-cyan-400 outline-none">
                </div>
                <button onclick="checkPin()" class="w-full py-4 glass hover:bg-white/5 rounded-xl text-[10px] font-black uppercase tracking-widest border-white/10">Overiť PIN</button>
            </div>

            <div id="auth-2" class="hidden space-y-6">
                <div id="pattern-lock" class="w-48 h-48 mx-auto relative border-2 border-white/5 rounded-full flex items-center justify-center cursor-pointer">
                    <div id="pattern-progress" class="absolute inset-0 border-4 border-cyan-400 rounded-full opacity-0 transition-opacity duration-300"></div>
                    <p class="text-[10px] font-black uppercase tracking-widest text-cyan-400">Držte prst</p>
                </div>
            </div>
        </div>

        <!-- MODAL OBSAH: NASTAVENIA (Zobrazí sa po úspešnej auth) -->
        <div id="settings-view" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[95%] max-w-4xl p-10 glass rounded-[3rem] border-white/10 animate-in">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black uppercase">Admin Panel</h2>
                <button onclick="toggleSettings()" class="p-3 hover:bg-white/10 rounded-xl transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"/></svg>
                </button>
            </div>
            
            <div class="grid md:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-2xl border-white/5">
                    <label class="text-[10px] uppercase font-bold text-white/40 mb-2 block tracking-widest">API Key Konfigurácia</label>
                    <input type="password" id="api-key" placeholder="••••••••" class="w-full bg-black/40 p-4 rounded-xl border border-white/10 outline-none mb-4">
                    <button onclick="saveKey()" class="w-full py-3 bg-white text-black rounded-xl font-bold text-xs uppercase">Aktualizovať kľúč</button>
                </div>
                <div class="glass p-6 rounded-2xl border-white/5 flex flex-col justify-center">
                    <p class="text-xs text-white/40 mb-4">Správa systémovej databázy IndexedDB</p>
                    <button onclick="clearAllData()" class="w-full py-3 border border-red-500/30 text-red-500 rounded-xl font-bold text-xs uppercase hover:bg-red-500/10">Resetovať dáta</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db;
        const DB_NAME = "ScannerEngineDB_v2";
        let authState = false;

        // Inicializácia DB
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings');
            if (!db.objectStoreNames.contains('scans')) db.createObjectStore('scans', { autoIncrement: true });
        };
        request.onsuccess = (e) => db = e.target.result;

        // Skener
        const scanner = new Html5QrcodeScanner("reader", { fps: 30, qrbox: 250 });
        scanner.render((text) => {
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('active-result').classList.remove('hidden');
            document.getElementById('decoded-text').innerText = text;
        });

        function nextStep(input, idx) {
            if (input.value && idx < 3) document.querySelectorAll('.pin-in')[idx + 1].focus();
        }

        function checkPin() {
            let val = "";
            document.querySelectorAll('.pin-in').forEach(p => val += p.value);
            if (val === "1337") {
                document.getElementById('auth-1').classList.add('hidden');
                document.getElementById('auth-2').classList.remove('hidden');
                initBiometric();
            } else {
                alert("NESPRÁVNY PIN");
                document.querySelectorAll('.pin-in').forEach(p => p.value = "");
            }
        }

        function initBiometric() {
            const btn = document.getElementById('pattern-lock');
            const prog = document.getElementById('pattern-progress');
            let timer;

            btn.onmousedown = btn.ontouchstart = () => {
                prog.style.opacity = "1";
                timer = setTimeout(() => {
                    authState = true;
                    showSettingsView();
                }, 1500);
            };

            btn.onmouseup = btn.onmouseleave = btn.ontouchend = () => {
                clearTimeout(timer);
                prog.style.opacity = "0";
            };
        }

        function toggleSettings() {
            const modal = document.getElementById('modal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                if (authState) showSettingsView();
                else showAuthView();
            }
        }

        function showAuthView() {
            document.getElementById('auth-view').classList.remove('hidden');
            document.getElementById('settings-view').classList.add('hidden');
            document.querySelectorAll('.pin-in')[0].focus();
        }

        function showSettingsView() {
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('settings-view').classList.remove('hidden');
        }

        function saveKey() {
            const val = document.getElementById('api-key').value;
            const tx = db.transaction('settings', 'readwrite');
            tx.objectStore('settings').put(val, 'api_key');
            alert("ULOŽENÉ");
        }

        function clearAllData() {
            if(confirm("Vymazať všetko?")) {
                indexedDB.deleteDatabase(DB_NAME);
                location.reload();
            }
        }
    </script>
</body>
</html>
