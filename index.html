<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Glass QR Pro - Live Scanner</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00f2ff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #050505; 
            color: white; 
            margin: 0;
            overflow-x: hidden;
        }

        h1, h2, .font-heading { font-family: 'Space Grotesk', sans-serif; }

        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(147, 51, 234, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(5, 5, 5, 1) 0%, rgba(10, 10, 10, 0.9) 100%);
            z-index: -1;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px) saturate(150%); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Live Scanner Styles */
        #reader {
            width: 100% !important;
            border: none !important;
        }
        
        #reader video {
            border-radius: 24px;
            object-fit: cover !important;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            top: 0;
            left: 0;
            z-index: 10;
            animation: scan-anim 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scan-anim {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .btn-action {
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            color: #000;
            transition: all 0.3s ease;
        }

        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.9); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="bg-mesh"></div>

    <!-- Header -->
    <header class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[calc(100%-3rem)] max-w-5xl">
        <nav class="glass px-6 py-4 rounded-3xl flex justify-between items-center border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-cyan-400 rounded-lg flex items-center justify-center text-black font-black text-xs">AI</div>
                <h1 class="text-sm font-bold tracking-widest uppercase">Scanner <span class="text-cyan-400 font-mono">v2.0</span></h1>
            </div>
            <button onclick="toggleSettings()" class="p-2 hover:bg-white/10 rounded-xl transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37a1.724 1.724 0 002.572-1.065z" stroke-width="2"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2"/></svg>
            </button>
        </nav>
    </header>

    <main class="relative z-10 pt-28 pb-10 px-6 max-w-6xl mx-auto">
        <div class="grid lg:grid-cols-2 gap-8 items-center min-h-[70vh]">
            
            <!-- Live Camera View -->
            <div class="space-y-4">
                <div class="relative glass p-2 rounded-[2.5rem] border-white/10 overflow-hidden shadow-2xl">
                    <div id="scanner-container" class="relative rounded-[2rem] overflow-hidden bg-black aspect-square md:aspect-video flex items-center justify-center">
                        <div id="reader"></div>
                        <div id="scan-line" class="scan-line hidden"></div>
                        
                        <!-- Camera Prompt -->
                        <div id="camera-prompt" class="absolute inset-0 flex flex-col items-center justify-center bg-black/60 z-20 transition-opacity">
                            <button onclick="initLiveScanner()" class="btn-action px-8 py-4 rounded-2xl font-bold uppercase text-xs tracking-widest shadow-lg active:scale-95 transition-all">
                                Aktivovať Kameru
                            </button>
                            <p class="text-[10px] text-white/40 mt-4 uppercase tracking-tighter">Vyžaduje povolenie k senzoru</p>
                        </div>
                    </div>
                </div>
                <div class="flex justify-between px-4 text-[10px] text-white/30 font-mono uppercase">
                    <span>Status: <span id="status-text" class="text-red-500">Offline</span></span>
                    <span>Engine: QR-LENS-PRO</span>
                </div>
            </div>

            <!-- Result Panel -->
            <div class="h-full flex flex-col justify-center">
                <div id="result-box" class="glass p-8 rounded-[2.5rem] border-white/10 min-h-[300px] flex flex-col transition-all duration-500">
                    <div id="placeholder" class="flex-1 flex flex-col items-center justify-center text-center py-10">
                        <div class="w-16 h-16 border border-white/10 rounded-full flex items-center justify-center mb-4">
                            <svg class="w-6 h-6 text-white/10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg>
                        </div>
                        <h2 class="text-xl font-bold opacity-50 tracking-tight">Žiadne dáta</h2>
                        <p class="text-xs text-white/30 mt-2">Zamerajte kód pre okamžitý sken</p>
                    </div>

                    <div id="active-result" class="hidden flex-1 flex flex-col">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></span>
                            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-cyan-400">Decoded Stream</span>
                        </div>
                        <div id="decoded-text" class="flex-1 p-6 bg-black/30 rounded-2xl border border-white/5 font-mono text-sm leading-relaxed break-all mb-6"></div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="copyResult()" class="py-3 glass hover:bg-white/5 rounded-xl text-[10px] font-bold uppercase">Kopírovať</button>
                            <button onclick="resetScanner()" class="py-3 bg-white text-black rounded-xl text-[10px] font-bold uppercase">Nový Sken</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Modal: Auth & Settings -->
    <div id="modal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-xl" onclick="toggleSettings()"></div>
        
        <!-- Auth View -->
        <div id="auth-view" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-sm p-10 glass rounded-[3rem] border-white/10 animate-pop">
            <h2 class="text-center font-black uppercase italic tracking-tighter text-2xl mb-8">Admin Login</h2>
            <div class="flex justify-center gap-3 mb-8">
                <input type="password" maxlength="1" onkeyup="moveFocus(this, 0)" class="pin-box w-12 h-16 glass text-center text-2xl font-bold rounded-xl outline-none focus:border-cyan-400">
                <input type="password" maxlength="1" onkeyup="moveFocus(this, 1)" class="pin-box w-12 h-16 glass text-center text-2xl font-bold rounded-xl outline-none focus:border-cyan-400">
                <input type="password" maxlength="1" onkeyup="moveFocus(this, 2)" class="pin-box w-12 h-16 glass text-center text-2xl font-bold rounded-xl outline-none focus:border-cyan-400">
                <input type="password" maxlength="1" onkeyup="moveFocus(this, 3)" class="pin-box w-12 h-16 glass text-center text-2xl font-bold rounded-xl outline-none focus:border-cyan-400">
            </div>
            <button onclick="verifyPin()" class="w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl text-[10px] font-black uppercase tracking-widest">Vstúpiť</button>
        </div>

        <!-- Settings View -->
        <div id="settings-view" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-2xl p-10 glass rounded-[3rem] border-white/10 animate-pop">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black uppercase tracking-tighter">Systémové Jadro</h2>
                <button onclick="toggleSettings()" class="text-white/40 hover:text-white">Zavrieť</button>
            </div>
            <div class="space-y-6">
                <div class="p-6 bg-black/20 rounded-2xl border border-white/5">
                    <p class="text-[10px] text-white/40 uppercase font-bold mb-3 tracking-widest">Správa dát</p>
                    <button onclick="clearSystem()" class="w-full py-4 border border-red-500/30 text-red-500 rounded-xl text-xs font-bold uppercase hover:bg-red-500/10">Vymazať celú databázu</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let html5QrCode;
        let authSession = false;

        // --- Live Scanner Engine ---
        async function initLiveScanner() {
            const prompt = document.getElementById('camera-prompt');
            const status = document.getElementById('status-text');
            const scanLine = document.getElementById('scan-line');

            // Skryjeme tlačidlo a ukážeme aktivitu
            prompt.style.opacity = '0';
            setTimeout(() => prompt.classList.add('hidden'), 300);

            html5QrCode = new Html5Qrcode("reader");
            
            const config = { 
                fps: 30, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0 
            };

            try {
                // Pokus o spustenie zadnej kamery
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    onScanSuccess
                );
                
                status.innerText = "Live / Online";
                status.classList.replace('text-red-500', 'text-cyan-400');
                scanLine.classList.remove('hidden');
            } catch (err) {
                console.error("Chyba kamery:", err);
                alert("Nepodarilo sa pristupovať ku kamere. Skontrolujte povolenia.");
                prompt.classList.remove('hidden');
                prompt.style.opacity = '1';
            }
        }

        function onScanSuccess(decodedText) {
            // Zastavíme skenovanie po prvom úspechu (voliteľné)
            // html5QrCode.pause(); 
            
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('active-result').classList.remove('hidden');
            document.getElementById('decoded-text').innerText = decodedText;
            
            if ("vibrate" in navigator) navigator.vibrate(100);
        }

        function resetScanner() {
            document.getElementById('placeholder').classList.remove('hidden');
            document.getElementById('active-result').classList.add('hidden');
            document.getElementById('decoded-text').innerText = "";
            if(html5QrCode) html5QrCode.resume();
        }

        function copyResult() {
            const text = document.getElementById('decoded-text').innerText;
            navigator.clipboard.writeText(text);
            const btn = event.target;
            btn.innerText = "Skopírované!";
            setTimeout(() => btn.innerText = "Kopírovať", 2000);
        }

        // --- Auth & UI ---
        function toggleSettings() {
            const modal = document.getElementById('modal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                if (authSession) showSettings();
                else showAuth();
            }
        }

        function moveFocus(input, idx) {
            if (input.value && idx < 3) document.querySelectorAll('.pin-box')[idx + 1].focus();
        }

        function verifyPin() {
            let pin = "";
            document.querySelectorAll('.pin-box').forEach(i => pin += i.value);
            if (pin === "1337") {
                authSession = true;
                showSettings();
            } else {
                alert("Prístup zamietnutý");
                document.querySelectorAll('.pin-box').forEach(i => i.value = "");
            }
        }

        function showAuth() {
            document.getElementById('auth-view').classList.remove('hidden');
            document.getElementById('settings-view').classList.add('hidden');
        }

        function showSettings() {
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('settings-view').classList.remove('hidden');
        }

        function clearSystem() {
            if(confirm("Vymazať všetky systémové dáta?")) location.reload();
        }
    </script>
</body>
</html>
